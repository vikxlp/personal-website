{{ define "main" }}
<article class="single">
    <header>
        {{ if or (eq .Section "blog") (eq .Section "postcard") }}
        {{ partial "post-meta.html" (dict "Date" .Date) }}
        {{ end }}
        <h1>{{ .Title }}</h1>
    </header>
    <div class="content">
        {{ .Content }}
    </div>
</article>
{{ end }}
